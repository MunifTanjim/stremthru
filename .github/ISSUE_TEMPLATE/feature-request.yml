name: Feature Request
description: Request a feature for StremThru
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature for StremThru!

        Please fill out the following information to help us understand your request.

  - type: dropdown
    id: area
    attributes:
      label: Related Area
      description: If this feature request is related to a specific area, select it here
      options:
        - "Other"
        - "Addon: StremThru List"
        - "Addon: StremThru Wrap"
        - "Addon: StremThru Store"
        - "Addon: StremThru Torz"
        - "Addon: StremThru Newz"
        - "Dashboard: Torrent"
        - "Dashboard: Usenet"
        - "Dashboard: Worker"
        - "Dashboard: Other"
        - "Proxy"
        - "Tool: Stremio Sidekick"
    validations:
      required: false

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: Please describe the feature you'd like to see added.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Motivation
      description: Why do you want this feature? What problem does it solve?
      placeholder: Explain why this feature would be useful...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the feature request here (screenshots, mockups, examples, etc.)
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched for existing issues before creating this one
          required: true
        - label: I have provided all the required information above
          required: true
